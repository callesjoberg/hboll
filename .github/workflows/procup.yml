name: Uppdatera cupdata

on:
  workflow_dispatch:
  schedule:
    # Var 20:e minut — men scripts/_freshness.py håller den EFFEKTIVA
    # kadensen nere per cup: bara cuper inom/nära sitt eget kända
    # matchfönster (73h innan start till 24h efter sista matchen) skrapas
    # varje körning. Cuper långt fram i tiden kollas glest (~var 6:e
    # timme, samma kadens som tidigare), avslutade cuper trappar av helt
    # efter några uppföljningskontroller. Ingen extra kostnad att köra
    # tätt: publika repon har obegränsade Actions-minuter, och de flesta
    # körningarna gör inga nätverksanrop alls (should_refresh() säger nej
    # innan skrapningen ens börjar).
    - cron: "*/20 * * * *"

concurrency:
  group: update-cupdata
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Skrapa ProCup
        run: python3 scripts/fetch_procup.py
      - name: Skrapa Gothia Result Web-cuper (Partille m.fl.)
        run: python3 scripts/fetch_gothia.py
      - name: Snapshotta Cup Manager-cuperna
        run: python3 scripts/fetch_cupmanager.py
      - name: Arkivera årets resultat (för jämförelse mellan år)
        run: python3 scripts/archive_results.py
      - name: Committa om datan ändrats
        # Skrapan skriver bara om filen när innehållet faktiskt ändrats.
        run: |
          git config user.name "procup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Ingen ändring — hoppar över commit."
            exit 0
          fi
          git commit -m "Uppdatera cupdata"
          # Race-härdad push: var-20-minanders-körningar (plus manuella
          # pushar) kan hinna krocka. Försök integrera och pusha om,
          # annars hoppa tyst över just den här publiceringen i stället
          # för att fela jobbet — nästa körning tar det.
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 5 ]; then
              echo "Push misslyckades efter $n försök."; exit 1
            fi
            echo "Push avvisad (kapplöpning) — försöker igen ($n)."
            if ! git pull --rebase --autostash origin main; then
              git rebase --abort 2>/dev/null || true
              echo "Rebase-konflikt — hoppar över den här publiceringen (nästa körning fixar)."
              exit 0
            fi
            sleep $(( (RANDOM % 4) + 2 ))
          done
