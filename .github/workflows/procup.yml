name: Uppdatera cupdata

on:
  workflow_dispatch:
  schedule:
    # Var 6:e timme; tätare uppdatering behövs bara under cuphelger
    # (kör manuellt via workflow_dispatch/admin-sidan eller sänk intervallet då).
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Skrapa ProCup
        run: python3 scripts/fetch_procup.py
      - name: Skrapa Gothia Result Web-cuper (Partille m.fl.)
        run: python3 scripts/fetch_gothia.py
      - name: Snapshotta Cup Manager-cuperna
        run: python3 scripts/fetch_cupmanager.py
      - name: Arkivera årets resultat (för jämförelse mellan år)
        run: python3 scripts/archive_results.py
      - name: Committa om datan ändrats
        # Skrapan skriver bara om filen när innehållet faktiskt ändrats.
        run: |
          git config user.name "procup-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Ingen ändring — hoppar över commit."
          else
            git commit -m "Uppdatera ProCup-data"
            # Skydd mot kapplöpning med manuella pushar under körningen.
            git pull --rebase origin main
            git push
          fi
