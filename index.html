<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Cupschema · Alingsås HK</title>
  <meta name="description" content="Spelschema, resultat och tabeller för Alingsås HK:s cuper — Åhus Beach, Potatiscupen, Hallbybollen med flera.">
  <link rel="icon" href="assets/ahk-logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <img src="assets/ahk-logo.svg" alt="" width="34" height="38">
        <h1>Cupschema<small>Alingsås HK</small></h1>
        <span class="spacer"></span>
        <button id="refreshBtn" type="button" title="Hämta senaste schemat">↻ Uppdatera</button>
      </div>
      <nav id="cupRow" aria-label="Välj cup"></nav>
    </div>
  </header>

  <div class="subbar">
    <nav id="viewTabs" role="tablist" aria-label="Vy">
      <button class="tab on" role="tab" data-view="schema" type="button">Schema</button>
      <button class="tab" role="tab" data-view="tabeller" type="button">Tabeller</button>
      <button class="tab" role="tab" data-view="slutspel" type="button">Slutspel</button>
    </nav>
    <span id="meta"></span>
  </div>

  <section id="toolbar" aria-label="Filter"></section>

  <main id="content"></main>

  <footer>
    <span>Data hämtas live från cupmanager.net · tider kan ändras av arrangören.</span>
    <button id="addCupBtn" class="btn small" type="button">+ Lägg till cup</button>
    <a href="admin.html">Admin</a>
  </footer>

  <dialog id="addCupDialog">
    <h2>Lägg till cup</h2>
    <p>Öppna cupens resultatsida på cupmanager.net, visa sidans källkod och
       leta upp <code>tournamentId</code>. Klistra in värdnamn och ID här.</p>
    <form id="addCupForm">
      <input name="cupname" placeholder="Cupens namn (t.ex. Bohus Cup)" required>
      <input name="host" placeholder="Värd (t.ex. bohuscup.cupmanager.net)" required>
      <input name="tid" placeholder="Tournament-ID (siffror)" inputmode="numeric" pattern="\d+" required>
      <input name="place" placeholder="Ort (valfritt)">
      <input name="edition" placeholder="År (valfritt)">
      <div class="dialog-actions">
        <button type="button" class="btn" id="addCupClose">Avbryt</button>
        <button type="submit" class="btn primary">Spara</button>
      </div>
    </form>
    <div id="customCupList"></div>
  </dialog>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ics.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
